schema_version: 1

model:
  path: Qwen/Qwen3-0.6B
  tokenizer_path: null
  trust_remote_code: false
  revision: null

adapter:
  method: lora
  targets: null
  preset: attention-qv
  num_layers: null
  rank: 16
  scale: 32.0
  dropout: 0.0

data:
  train: data/alpaca/train.jsonl
  valid: data/alpaca/valid.jsonl
  test: null
  cache_dir: ~/.mlxforge/cache/preprocessed
  max_seq_length: 1024
  mask_prompt: true

training:
  batch_size: 2
  num_iters: 20
  learning_rate: 0.0003
  optimizer: adamw
  optimizer_config:
    weight_decay: 0.01
  lr_schedule:
    name: cosine_decay
    arguments: [0.0003, 10000, 0.000001]  # [init, decay_steps, end]
    warmup: 100
    warmup_init: 0.000001
  grad_accumulation_steps: 8
  max_grad_norm: 1.0
  seed: 42
  steps_per_report: 1
  steps_per_eval: 5
  steps_per_save: 8
  val_batches: 50
  keep_last_n_checkpoints: 3

runtime:
  run_dir: ~/.mlxforge/runs
  eager: false
  report_to: null
  wandb_project: null
